<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LJK Digital Dua Dimensi</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { 
      --primary: #0e58a6; var(--primary-light): #e7eff7; --secondary: #06294d;
      --bg: #f4f7fa; --surface: #ffffff; --text-main: #1e293b; --text-sub: #64748b;
      --border: #e2e8f0; --timer-bg: #fee2e2; --timer-text: #b91c1c; --timer-border: #f87171;
    }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: var(--text-main); padding: 20px; margin: 0; line-height: 1.6; }
    .container { width: 100%; max-width: 800px; margin: 0 auto; }
    .timer-card { background: var(--timer-bg); color: var(--timer-text); border: 1px solid var(--timer-border); padding: 15px; border-radius: 12px; text-align: center; font-weight: 700; font-size: 18px; margin-bottom: 20px; display: none; }
    .header-card { background: var(--surface); padding: 30px; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 30px; border-top: 6px solid var(--primary); }
    .logo-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .logo-container img { height: 60px; width: auto; object-fit: contain; }
    .header-text { text-align: center; }
    h2 { margin: 0; color: var(--primary); font-size: 22px; letter-spacing: -0.5px; }
    h4 { margin: 0; color: var(--secondary); font-size: 16px; letter-spacing: -0.5px; }
    p.subtitle { color: var(--text-sub); margin-top: 8px; font-size: 14px; }
    .section-title { background: var(--primary); color: white; padding: 12px 20px; border-radius: 12px; margin: 40px auto 20px auto; font-weight: 700; font-size: 14px; text-transform: uppercase; display: block; width: fit-content; }
    .form-group { background: var(--surface); margin-bottom: 16px; padding: 20px; border-radius: 16px; border: 1px solid var(--border); }
    input[type="text"] { width: 100%; padding: 14px; border: 2px solid var(--border); border-radius: 10px; font-size: 16px; box-sizing: border-box; margin-bottom: 15px; outline: none; }
    input:focus { border-color: var(--primary); }
    input:read-only { background-color: #f1f5f9; color: var(--text-sub); cursor: not-allowed; } 
    .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; }
    .option-label { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border: 1px solid var(--border); border-radius: 10px; cursor: pointer; font-size: 14px; }
    .option-label:has(input:checked) { background: #e7eff7; border-color: var(--primary); color: var(--primary); }
    .bs-table { width: 100%; border-collapse: separate; border-spacing: 0 8px; overflow-x: auto; display: block; white-space: nowrap; }
    .bs-table th { padding: 10px; color: var(--text-sub); font-size: 12px; }
    .bs-table td { padding: 12px; background: #f8fafc; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); text-align: center;}
    .bs-table td:first-child { border-left: 1px solid var(--border); border-radius: 8px 0 0 8px; text-align: left; }
    .bs-table td:last-child { border-right: 1px solid var(--border); border-radius: 0 8px 8px 0; }
    button { background: var(--primary); color: white; border: none; padding: 18px; width: 100%; font-size: 16px; font-weight: 700; border-radius: 12px; cursor: pointer; margin-top: 10px; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    #btnMulai { background: var(--secondary); margin-top: 20px; }
    #pesan { margin-top: 25px; text-align: center; padding: 20px; border-radius: 12px; display: none; }
    .success { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; display: block !important; }
    #loading-soal { text-align: center; padding: 20px; color: var(--primary); font-weight: bold; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="timer-card" id="timer-display">Sisa Waktu: --:--</div>

    <div class="header-card">
      <div class="logo-container">
        
        <img src="https://lh3.googleusercontent.com/d/196-yYlDwDc-tUVDTslzPAlBWTmf4ZbWg" alt="Logo Kanan">
      </div>
      <div class="header-text">
        <h2>LJK TKA</h2>
        <h4>DUA DIMENSI GEJAYAN</h4>
        <p class="subtitle">Silahkan lengkapi data diri Anda sebelum mulai mengerjakan</p>
      </div>
      
      <div style="margin-top:25px; text-align: left;" id="form-data-diri">
        <input type="text" id="nama" required placeholder="Nama Lengkap Siswa">
        <input type="text" id="sekolah" required placeholder="Asal Sekolah Siswa">
        <input type="text" id="kelas" required placeholder="Kelas">
      </div>

      <button type="button" id="btnMulai" onclick="mulaiUjian()">Mulai Mengerjakan</button>
      <div id="loading-soal">Memuat soal dari server... Mohon tunggu.</div>
    </div>

    <form id="ljkForm" onsubmit="event.preventDefault(); submitData(false);" style="display: none;">
      <div id="soal-container"></div>
      <button type="submit" id="btnSubmit" style="margin-top: 30px;">Selesaikan & Kirim Jawaban</button>
      <div id="pesan"></div>
    </form>
    
    <div class="footer-bottom">
      <p style="text-align: center; color: #06294d; margin-top: 30px;">© 2026 Klinik Edukasi Dua Dimensi. All Rights Reserved.</p>
    </div>
  </div>

  <script>
    // MASUKKAN URL GAS ANDA DI SINI
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbysDQ8V8DUSdS67BlfI0uWxaj7OyJemRlorU0Cya-7S4mOUVs-Bk8Fnk8FldHQxjUmQ4w/exec';

    let configSoal = [];
    let configMapel = [];

    const DURASI_MENIT = 60;
    let timeRemaining = DURASI_MENIT * 60; 
    let timerInterval;

    function mulaiUjian() {
      const namaVal = document.getElementById('nama').value;
      const sekolahVal = document.getElementById('sekolah').value;
      const kelasVal = document.getElementById('kelas').value;

      if (!namaVal.trim() || !sekolahVal.trim() || !kelasVal.trim()) {
        alert("Mohon lengkapi Nama, Sekolah, dan Kelas terlebih dahulu!");
        return;
      }

      document.getElementById('nama').readOnly = true;
      document.getElementById('sekolah').readOnly = true;
      document.getElementById('kelas').readOnly = true;

      document.getElementById('btnMulai').style.display = 'none';
      document.getElementById('loading-soal').style.display = 'block';

      // Mengambil data menggunakan Fetch API (Standar untuk GitHub Pages)
      fetch(GAS_URL)
        .then(response => response.json())
        .then(dataServer => {
           configMapel = dataServer.mapel;
           configSoal = dataServer.soal;
           
           document.getElementById('loading-soal').style.display = 'none';
           document.getElementById('timer-display').style.display = 'block';
           document.getElementById('ljkForm').style.display = 'block';
           document.querySelector('.subtitle').innerText = "Silahkan isi jawaban Anda dengan teliti";
           
           renderSoal();
           startTimer();
        })
        .catch(err => {
           alert("Gagal memuat soal. Pastikan koneksi internet stabil.");
           document.getElementById('btnMulai').style.display = 'block';
           document.getElementById('loading-soal').style.display = 'none';
        });
    }

    function startTimer() {
      const timerDisplay = document.getElementById('timer-display');
      timerInterval = setInterval(() => {
        if (timeRemaining <= 0) {
          clearInterval(timerInterval);
          timerDisplay.innerText = "Waktu Habis!";
          submitData(true); 
        } else {
          let minutes = Math.floor(timeRemaining / 60);
          let seconds = timeRemaining % 60;
          timerDisplay.innerText = `Sisa Waktu: ${minutes < 10 ? '0' : ''}${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
          timeRemaining--;
        }
      }, 1000);
    }

    function renderSoal() {
      const container = document.getElementById('soal-container');
      let html = '';
      
      configSoal.forEach((item) => {
        configMapel.forEach(mapel => {
            if(item.no === mapel.mulai) { html += `<div class="section-title">${mapel.nama}</div>`; }
        });

        html += `<div class="form-group">`;
        
        if (item.tipe === 'single') {
          html += `<label class="question">Soal No. ${item.no}</label><div class="options-grid">`;
          ['A','B','C','D'].forEach(opt => {
            html += `<label class="option-label"><input type="radio" name="q${item.no}" value="${opt}"> ${opt}</label>`;
          });
          html += `</div>`;
        } 
        else if (item.tipe === 'mcma') {
          html += `<label class="question">Soal No. ${item.no} (Pilih Pernyataan)</label><div class="options-grid">`;
          ['1','2','3','4'].forEach(opt => {
            html += `<label class="option-label"><input type="checkbox" name="q${item.no}" value="${opt}"> P-${opt}</label>`;
          });
          html += `</div>`;
        } 
        else if (item.tipe === 'matrix') {
          let cols = item.kolom.split(',').map(c => c.trim());
          html += `<label class="question">Soal No. ${item.no}</label><table class="bs-table"><tr><th>Pernyataan</th>`;
          cols.forEach(c => html += `<th>${c}</th>`);
          html += `</tr>`;
          for(let r=1; r<=item.baris; r++) {
            html += `<tr><td>Pernyataan ${r}</td>`;
            cols.forEach(c => {
              html += `<td><input type="radio" name="q${item.no}_r${r}" value="${c}"></td>`;
            });
            html += `</tr>`;
          }
          html += `</table>`;
        }
        html += `</div>`;
      });
      container.innerHTML = html;
    }

    function submitData(isAutoSubmit) {
      let namaVal = document.getElementById('nama').value;
      let sekolahVal = document.getElementById('sekolah').value;
      let kelasVal = document.getElementById('kelas').value;
      
      const btn = document.getElementById('btnSubmit');
      const pesanDiv = document.getElementById('pesan');

      if (!isAutoSubmit) {
        if (!namaVal.trim() || !sekolahVal.trim() || !kelasVal.trim()) { alert("Mohon lengkapi data diri!"); return; }
      } else {
        if (!namaVal.trim()) namaVal = "TIDAK DIISI";
        if (!sekolahVal.trim()) sekolahVal = "-";
        if (!kelasVal.trim()) kelasVal = "-";
      }

      clearInterval(timerInterval); 
      btn.innerText = 'Mengirim Jawaban...'; btn.disabled = true;
      
      let dataLJK = { nama: namaVal, sekolah: sekolahVal, kelas: kelasVal };

      configSoal.forEach(item => {
        if (item.tipe === 'single') {
          const el = document.querySelector(`input[name="q${item.no}"]:checked`);
          dataLJK[`q${item.no}`] = el ? el.value : "";
        } else if (item.tipe === 'mcma') {
          const els = document.querySelectorAll(`input[name="q${item.no}"]:checked`);
          dataLJK[`q${item.no}`] = Array.from(els).map(e => e.value);
        } else if (item.tipe === 'matrix') {
          let arr = [];
          for(let r=1; r<=item.baris; r++) {
            const el = document.querySelector(`input[name="q${item.no}_r${r}"]:checked`);
            arr.push(el ? el.value : "");
          }
          dataLJK[`q${item.no}`] = arr;
        }
      });

      // Mengirim POST request via Fetch
      fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify(dataLJK),
        headers: { 'Content-Type': 'text/plain;charset=utf-8' } // text/plain digunakan agar tidak kena block CORS
      })
      .then(response => response.json())
      .then(data => {
        if(data.status === 'success') {
          pesanDiv.innerHTML = data.message;
          pesanDiv.className = 'success';
          btn.innerText = 'Terkirim';
          window.scrollTo(0, 0);
          
          document.getElementById('ljkForm').style.display = 'none';
          document.getElementById('timer-display').style.display = 'none';
        } else {
          alert('Terjadi kesalahan di server: ' + data.message);
          btn.innerText = 'Selesaikan & Kirim Jawaban'; btn.disabled = false;
        }
      })
      .catch(error => {
        console.error('Error:', error);
        alert('Gagal mengirim jawaban. Pastikan koneksi internet stabil.');
        btn.innerText = 'Selesaikan & Kirim Jawaban'; btn.disabled = false;
      });
    }
  </script>
</body>
</html>
